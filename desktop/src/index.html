<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>FraudNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="lib/react.development.js"></script>
<script src="lib/react-dom.development.js"></script>
<script src="lib/babel.min.js"></script>
<script src="lib/d3.min.js"></script>

<script type="text/babel" src="PitchView.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="GraphView.jsx"></script>
<script type="text/babel" src="LiveOps.jsx"></script>
<script type="text/babel" src="DataGen.jsx"></script>
<script type="text/babel" src="ModelStats.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const VIEWS = [
  { id: "pitch",     label: "Vue Projet",    ready: true  },
  { id: "dashboard", label: "Vue Données",   ready: true  },
  { id: "graph",     label: "Réseau Neo4j",  ready: true  },
  { id: "live",      label: "MARS Analyzer", ready: true  },
  { id: "datagen",   label: "Générateur",    ready: true  },
  { id: "model",     label: "Performance",   ready: true  },
];

function ApiPill() {
  const [ok, setOk] = useState(null);
  useEffect(() => {
    const check = async () => {
      try {
        const r = await fetch("http://localhost:8000/health", {
          signal: AbortSignal.timeout(3000),
        });
        setOk(r.ok);
      } catch { setOk(false); }
    };
    check();
    const id = setInterval(check, 15000);
    return () => clearInterval(id);
  }, []);
  const dot   = ok === null ? "rgba(255,255,255,.3)" : ok ? "#4ade80" : "#f87171";
  const label = ok === null ? "API…" : ok ? "API connectée" : "API hors ligne";
  return (
    <div className="status-pill">
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: dot, display: "inline-block" }}/>
      <span>{label}</span>
    </div>
  );
}

function TopBar({ view, setView }) {
  return (
    <div className="topbar">
      <div className="logo">
        <div className="logo-mark">F</div>
        <span className="logo-name">FraudNet</span>
        <span className="logo-sub">· CONSOLE ANTIFRAUDE</span>
      </div>
      <div className="topbar-spacer"/>
      <div className="nav-tabs">
        {VIEWS.map(v => (
          <button
            key={v.id}
            className="nav-tab"
            data-active={String(view === v.id)}
            disabled={!v.ready}
            onClick={() => v.ready && setView(v.id)}
            title={v.ready ? "" : "En construction"}
          >
            {v.label}
          </button>
        ))}
      </div>
      <ApiPill/>
    </div>
  );
}

function App() {
  const [view, setView] = useState("pitch");
  const isFixed = view === "graph" || view === "live" || view === "datagen";
  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column" }}>
      <TopBar view={view} setView={setView}/>
      <div style={{ flex: 1, minHeight: 0, overflowY: isFixed ? "hidden" : "auto" }}>
        {view === "pitch"     && <PitchView/>}
        {view === "dashboard" && <Dashboard/>}
        {view === "graph"     && <GraphView/>}
        {view === "live"      && <LiveOps/>}
        {view === "datagen"   && <DataGen/>}
        {view === "model"     && <ModelStats/>}
      </div>
    </div>
  );
}

function mount() {
  if (!window.PitchView || !window.Dashboard || !window.GraphView || !window.LiveOps || !window.DataGen || !window.ModelStats) {
    setTimeout(mount, 30); return;
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}
mount();
</script>
</body>
</html>
