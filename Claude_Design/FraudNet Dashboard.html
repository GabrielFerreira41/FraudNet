<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>FraudNet — Console Antifraude</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="src/styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/data.js"></script>
<script type="text/babel" src="src/LiveOps.jsx"></script>
<script type="text/babel" src="src/ModelStats.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "numAccounts": 24,
  "initialSpeed": 1.2,
  "initialView": "live"
}/*EDITMODE-END*/;

function TopBar({ view, setView, accounts, transactions }) {
  const flagged = accounts.filter(a => a.flagged).length;
  const blocked = transactions.filter(t => t.action === "blocked").length;
  return (
    <div className="topbar">
      <div className="logo">
        <div className="logo-mark">F</div>
        <span>FraudNet</span>
        <span className="logo-sub">· CONSOLE ANTIFRAUDE</span>
      </div>
      <div className="nav-tabs">
        <button className="nav-tab" data-active={view==="live"} onClick={()=>setView("live")}>
          Live Ops
        </button>
        <button className="nav-tab" data-active={view==="model"} onClick={()=>setView("model")}>
          Performance modèle
        </button>
      </div>
      <div className="topbar-right">
        <div className="health-pill">
          <span style={{width:6, height:6, borderRadius:"50%", background:"var(--ok)"}}/>
          <span className="mono">API 142ms</span>
        </div>
        <div className="health-pill">
          <span className="mono" style={{color:"var(--alert)"}}>⊘ {blocked}</span>
          <span style={{color:"var(--ink-40)"}}>bloqués aujourd'hui</span>
        </div>
        <div className="health-pill">
          <span className="mono" style={{color:"var(--warn)"}}>⚑ {flagged}</span>
          <span style={{color:"var(--ink-40)"}}>comptes flagués</span>
        </div>
        <div style={{display:"flex", alignItems:"center", gap:8, paddingLeft:6}}>
          <div style={{width:26, height:26, borderRadius:"50%", background:"var(--bg-3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:600}}>GF</div>
        </div>
      </div>
    </div>
  );
}

function Tweaks({ open, tweaks, setTweaks, onClose }) {
  if (!open) return null;
  const update = (k, v) => {
    setTweaks(prev => ({...prev, [k]: v}));
    try {
      window.parent.postMessage({type:"__edit_mode_set_keys", edits:{[k]: v}}, "*");
    } catch(e){}
  };
  return (
    <div className="tweaks">
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <h3>TWEAKS</h3>
        <button className="btn-ghost" onClick={onClose}>✕</button>
      </div>
      <div className="tweak-row">
        <label>Nombre de comptes</label>
        <input type="range" min="8" max="40" step="1" value={tweaks.numAccounts} onChange={e=>update("numAccounts", parseInt(e.target.value))}/>
        <span className="mono" style={{width:22, textAlign:"right"}}>{tweaks.numAccounts}</span>
      </div>
      <div className="tweak-row">
        <label>Vitesse initiale</label>
        <input type="range" min="0.3" max="4" step="0.1" value={tweaks.initialSpeed} onChange={e=>update("initialSpeed", parseFloat(e.target.value))}/>
        <span className="mono" style={{width:32, textAlign:"right"}}>{tweaks.initialSpeed.toFixed(1)}x</span>
      </div>
      <div className="tweak-row">
        <label>Vue d'accueil</label>
        <div style={{display:"flex", gap:4}}>
          <button className="chip" data-active={tweaks.initialView==="live"} onClick={()=>update("initialView","live")}>Live</button>
          <button className="chip" data-active={tweaks.initialView==="model"} onClick={()=>update("initialView","model")}>Modèle</button>
        </div>
      </div>
      <div style={{fontSize:10, color:"var(--ink-40)", marginTop:10, paddingTop:10, borderTop:"1px solid var(--line)"}}>
        Modifier # de comptes recharge les données simulées.
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [view, setView] = useState(tweaks.initialView);
  const [accounts, setAccounts] = useState(() => window.FraudNet.generateAccounts(tweaks.numAccounts));
  const [transactions, setTransactions] = useState([]);
  const [paused, setPaused] = useState(false);
  const [speed, setSpeed] = useState(tweaks.initialSpeed);
  const [historical] = useState(() => window.FraudNet.generateHistoricalMetrics());

  // regen accounts if tweak changes
  useEffect(() => {
    setAccounts(window.FraudNet.generateAccounts(tweaks.numAccounts));
    setTransactions([]);
  }, [tweaks.numAccounts]);

  // tweaks-mode handshake
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    try { window.parent.postMessage({type: "__edit_mode_available"}, "*"); } catch(e){}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  // persist view in localStorage so refresh keeps state
  useEffect(() => {
    const saved = localStorage.getItem("fraudnet_view");
    if (saved) setView(saved);
  }, []);
  useEffect(() => { localStorage.setItem("fraudnet_view", view); }, [view]);

  return (
    <div style={{height:"100vh", display:"flex", flexDirection:"column"}}>
      <TopBar view={view} setView={setView} accounts={accounts} transactions={transactions}/>
      <div style={{flex:1, minHeight:0}}>
        {view === "live" ? (
          <LiveOps
            accounts={accounts} setAccounts={setAccounts}
            transactions={transactions} setTransactions={setTransactions}
            paused={paused} setPaused={setPaused}
            speed={speed} setSpeed={setSpeed}
          />
        ) : (
          <ModelStats historical={historical} transactions={transactions}/>
        )}
      </div>
      <Tweaks open={tweaksOpen} tweaks={tweaks} setTweaks={setTweaks} onClose={()=>setTweaksOpen(false)}/>
    </div>
  );
}

// Wait for Babel scripts to transpile so LiveOps/ModelStats are on window
function mount() {
  if (!window.LiveOps || !window.ModelStats) { setTimeout(mount, 30); return; }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}
mount();
</script>
</body>
</html>
